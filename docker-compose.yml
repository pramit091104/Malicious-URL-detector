services:
  # The Frontend Application (Nginx: serves static files + proxies /api to backend)
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    image: ${UNIQUE_PROJECT_NAME:-${PROJECT_NAME:-url-detector}}-frontend:latest
    container_name: ${UNIQUE_PROJECT_NAME:-${PROJECT_NAME:-url-detector}}-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

  # The Backend Application API
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    image: ${UNIQUE_PROJECT_NAME:-${PROJECT_NAME:-url-detector}}-backend:latest
    container_name: ${UNIQUE_PROJECT_NAME:-${PROJECT_NAME:-url-detector}}-backend
    ports:
      - "${BACKEND_PORT}:3000"
    environment:
      - PORT=3000
    volumes:
      - ai-backend-data:/app/backend/data
    restart: unless-stopped
    networks:
      - app-network

  # Prometheus Metrics Storage
  prometheus:
    image: prom/prometheus:latest
    container_name: ${UNIQUE_PROJECT_NAME:-${PROJECT_NAME:-url-detector}}-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - app-network

  # Grafana Dashboard
  grafana:
    image: grafana/grafana-oss:latest
    container_name: ${UNIQUE_PROJECT_NAME:-${PROJECT_NAME:-url-detector}}-grafana
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  ai-backend-data:
  prometheus-data:
  grafana-data:
