services:
  # The Frontend Application (Nginx: serves static files + proxies /api to backend)
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    image: ${PROJECT_NAME}-frontend:latest
    container_name: ${PROJECT_NAME}-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

  # The Backend Application API
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    image: ${PROJECT_NAME}-backend:latest
    container_name: ${PROJECT_NAME}-backend
    ports:
      - "${BACKEND_PORT}:3000"
    environment:
      - PORT=3000
    volumes:
      - ai-backend-data:/app/backend/data
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  ai-backend-data:
