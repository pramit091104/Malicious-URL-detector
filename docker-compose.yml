services:
  # The Frontend Application (Nginx: serves static files + proxies /api to backend)
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    image: pramit-frontend:latest
    container_name: pramit-frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

  # The Backend Application API
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    image: pramit-backend:latest
    container_name: pramit-backend
    ports:
      - "4001:3000"
    environment:
      - PORT=3000
    volumes:
      - ai-backend-data:/app/backend/data
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  ai-backend-data:
